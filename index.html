<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Léo Mesbah</title>
    <meta
      name="description"
      content="Léo Mesbah builds products, tooling and internet systems. Founder of Coinvote.cc."
    />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon-lm.svg" />
    <link rel="shortcut icon" href="assets/images/favicon-lm.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <nav class="mobile-topbar" id="mobile-topbar" aria-label="Navigation">
      <button class="mobile-topbar__brand" type="button" data-view="overview" aria-label="Back to home">
        <img class="mobile-topbar__portrait" src="assets/images/portrait.jpg" alt="Léo Mesbah" width="768" height="768">
        <span class="mobile-topbar__name">Léo Mesbah</span>
      </button>
      <div class="mobile-topbar__actions">
        <button class="mobile-topbar__btn" id="mobile-theme-toggle" type="button" aria-label="Switch color mode"></button>
        <button class="mobile-topbar__btn" id="mobile-projects-toggle" type="button" aria-label="Open projects menu" aria-expanded="false"></button>
      </div>
    </nav>
    <div class="rail-overlay" id="rail-overlay" aria-hidden="true"></div>

    <main class="shell">
      <aside class="rail">
        <button class="rail-close" id="rail-close" type="button" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <section class="identity">
          <img
            class="identity__portrait"
            src="assets/images/portrait.jpg"
            alt="Portrait of Léo Mesbah"
            width="768"
            height="768"
          />
          <div class="identity__copy">
            <h1>Léo Mesbah</h1>
            <p>Software Engineer, KNDS France</p>
            <p>LLC Founder, Coinvote.cc</p>
          </div>
        </section>

        <section class="rail-group">
          <p class="rail-label">Index</p>
          <button class="rail-link rail-link--featured is-active" type="button" data-view="overview">
            <span class="rail-link__thumb rail-link__thumb--overview" aria-hidden="true"></span>
            <span class="rail-link__body">
              <strong>My space</strong>
              <small>Short profile, current focus, archive tabs</small>
            </span>
          </button>
        </section>

        <section class="rail-group">
          <p class="rail-label rail-label--star">
            <span class="rail-label__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.2 1 6-5.4-2.8-5.4 2.8 1-6-4.4-4.2 6.1-.9L12 3Z"/></svg>
            </span>
            <span>Highlights</span>
          </p>

          <button class="rail-link rail-link--featured" type="button" data-view="coinvote" data-starred="true">
            <img class="rail-link__logo-thumb" src="assets/images/logos/coinvote_logo.png" alt="" aria-hidden="true" />
            <span class="rail-link__body">
              <strong>Coinvote.cc</strong>
              <small>Current product</small>
              <span class="rail-link__tags"><span>Web</span><span>Mobile</span></span>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="bubblebot" data-starred="true">
            <img class="rail-link__logo-thumb" src="assets/images/logos/bubblebot.png" alt="" aria-hidden="true" />
            <span class="rail-link__body">
              <strong>Bubble Bot</strong>
              <small>Automation product</small>
              <span class="rail-link__tags"><span>SaaS</span><span>Web</span><span>Reverse Eng.</span></span>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="sigmacraft" data-starred="true">
            <img class="rail-link__logo-thumb" src="assets/images/logos/sigmacraft.svg" alt="" aria-hidden="true" />
            <span class="rail-link__body">
              <strong>SigmaCraft</strong>
              <small>Early work</small>
              <span class="rail-link__tags"><span>Web</span><span>Java</span><span>Plugins</span></span>
            </span>
          </button>
        </section>

        <section class="rail-group rail-group--archive">
          <div class="rail-head">
            <p class="rail-label">All projects</p>
            <span id="project-archive-count">0 projects</span>
          </div>
          <div class="rail-filters" id="project-filters" aria-label="Project filters"></div>
          <div class="rail-archive-list" id="project-archive-list"></div>
        </section>

        <footer class="rail-footer">
          <a class="rail-footer__link" href="https://github.com/gniax" target="_blank" rel="noreferrer" title="GitHub" aria-label="GitHub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.4 1.1 3 .9.1-.7.3-1.1.6-1.4-2.2-.2-4.6-1.1-4.6-5a4 4 0 0 1 1-2.7c-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.8 1a9.6 9.6 0 0 1 5 0c1.9-1.3 2.8-1 2.8-1 .5 1.4.2 2.4.1 2.7a4 4 0 0 1 1 2.7c0 3.9-2.4 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0 0 12 2Z"/></svg>
          </a>
          <a class="rail-footer__link" href="mailto:leomesbah@outlook.fr" title="Email" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          </a>
          <span class="rail-footer__locale">🇫🇷</span>
        </footer>
      </aside>

      <section class="panel">
        <button class="site-theme-toggle" id="theme-mode-toggle" type="button" aria-label="Switch color mode" title="Switch color mode">
          <span class="theme-mode-toggle__icon" aria-hidden="true"></span>
        </button>
        <div id="main-view"></div>
      </section>
    </main>
    <div class="design-modal" id="design-modal" hidden aria-hidden="true"></div>

    <div class="theme-picker" data-open="false" data-revealed="false">
      <div class="theme-picker__panel" role="dialog" aria-label="Theme manager" hidden></div>
    </div>
  </body>
</html>
