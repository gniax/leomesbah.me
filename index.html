<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leo Mesbah</title>
    <meta
      name="description"
      content="Leo Mesbah builds products, tooling and internet systems. Founder of Coinvote.cc."
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <section class="identity">
          <img
            class="identity__portrait"
            src="assets/images/portrait.jpg"
            alt="Portrait of Leo Mesbah"
            width="768"
            height="768"
          />
          <div class="identity__copy">
            <h1>Léo Mesbah <span class="identity__flag" title="France">🇫🇷</span></h1>
            <p>Software Engineer, KNDS France</p>
            <p>Founder, Coinvote.cc</p>
          </div>
        </section>

        <section class="rail-group">
          <p class="rail-label">Index</p>
          <button class="rail-link rail-link--featured is-active" type="button" data-view="overview">
            <span class="rail-link__thumb rail-link__thumb--overview" aria-hidden="true"></span>
            <span class="rail-link__body">
              <strong>My space</strong>
              <small>Short profile, current focus, archive tabs</small>
            </span>
          </button>
        </section>

        <section class="rail-group">
          <p class="rail-label">Projects</p>

          <button class="rail-link rail-link--featured" type="button" data-view="coinvote">
            <span class="rail-link__thumb rail-link__thumb--coinvote" aria-hidden="true"></span>
            <span class="rail-link__body">
              <strong>Coinvote.cc</strong>
              <small>Current product</small>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="bubblebot">
            <img
              class="rail-link__thumb rail-link__thumb--image"
              src="assets/images/projects/bubblebot.png"
              alt=""
              width="1171"
              height="768"
            />
            <span class="rail-link__body">
              <strong>Bubble Bot</strong>
              <small>Automation product</small>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="hytale">
            <img
              class="rail-link__thumb rail-link__thumb--image"
              src="assets/images/projects/hytale-serveur.png"
              alt=""
              width="768"
              height="768"
            />
            <span class="rail-link__body">
              <strong>Hytale-Serveur</strong>
              <small>Public web platform</small>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="vinted">
            <span class="rail-link__thumb rail-link__thumb--vinted" aria-hidden="true"></span>
            <span class="rail-link__body">
              <strong>Vinted Republish</strong>
              <small>Browser tooling</small>
            </span>
          </button>

          <button class="rail-link rail-link--featured" type="button" data-view="vela">
            <img
              class="rail-link__thumb rail-link__thumb--image"
              src="assets/images/projects/vela-tracking.png"
              alt=""
              width="1366"
              height="768"
            />
            <span class="rail-link__body">
              <strong>VELA Tracking</strong>
              <small>Realtime systems</small>
            </span>
          </button>
        </section>

        <section class="rail-group rail-group--archive">
          <div class="rail-head">
            <p class="rail-label">All projects</p>
            <span id="project-archive-count">0 projects</span>
          </div>
          <div class="rail-filters" id="project-filters" aria-label="Project categories"></div>
          <div class="rail-archive-list" id="project-archive-list"></div>
        </section>

        <footer class="rail-footer">
          <a class="rail-footer__link" href="https://coinvote.cc" target="_blank" rel="noreferrer" title="Coinvote.cc" aria-label="Coinvote.cc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5a3 3 0 0 0-5.5 1.5c0 3 5.5 2 5.5 5a3 3 0 0 1-5.5 1.5"/><path d="M12 7v2"/><path d="M12 17v2"/></svg>
          </a>
          <a class="rail-footer__link" href="https://github.com/gniax" target="_blank" rel="noreferrer" title="GitHub" aria-label="GitHub">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.3-3.4-1.3-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.4 1.1 3 .9.1-.7.3-1.1.6-1.4-2.2-.2-4.6-1.1-4.6-5a4 4 0 0 1 1-2.7c-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.8 1a9.6 9.6 0 0 1 5 0c1.9-1.3 2.8-1 2.8-1 .5 1.4.2 2.4.1 2.7a4 4 0 0 1 1 2.7c0 3.9-2.4 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5A10 10 0 0 0 12 2Z"/></svg>
          </a>
          <a class="rail-footer__link" href="mailto:hello@leomesbah.me" title="Email" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          </a>
          <span class="rail-footer__locale">🇫🇷</span>
        </footer>
      </aside>

      <section class="panel">
        <div id="main-view"></div>
      </section>
    </main>

    <div class="theme-picker" data-open="false">
      <button class="theme-picker__toggle" type="button" aria-expanded="false">
        <span class="theme-picker__dot" aria-hidden="true"></span>
        <span class="theme-picker__label">theme</span>
        <span class="theme-picker__caret" aria-hidden="true">▾</span>
      </button>
      <div class="theme-picker__panel" role="listbox" hidden></div>
    </div>
  </body>
</html>
