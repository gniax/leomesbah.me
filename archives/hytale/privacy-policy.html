		<label style="font-family:'OpenSans-Regular';font-weight: 400;word-break: break-word;">
<label style="text-align:center;font-size:30px;"> Politique de confidentialité (standard RGPD)</label>
<br />
<p><strong style="font-size: 20px;">Sécurité et protection des données personnelles</strong></p>
<br />
<p><strong style="font-size: 18px;text-decoration: underline;">Définitions :</strong></p>
<br />
<b>L'Éditeur :</b> La personne, physique ou morale, qui édite les services de communication au public en ligne.<br />
<b>Le Site :</b> L'ensemble des sites, pages Internet et services en ligne proposés par l'Éditeur.<br />
<b>L'Utilisateur :</b> La personne utilisant le Site et les services.<br />
<br />
<strong style="font-size: 18px;">Nature des données collectées:</strong><br />
<br />
<b>Dans le cadre de l'utilisation des Sites, l'Éditeur est susceptible de collecter les catégories de données
suivantes concernant ses Utilisateurs :</b><br />
<br />
Données relatives à la vie personnelle (nom, prénom, e-mail, hors données sensibles ou
dangereuses)<br />
<br />
Données de connexion (adresses IP, journaux d'événements...)<br />
<br />
<strong style="font-size: 18px;">Communication des données personnelles à des tiers:</strong><br />
<br />
<b>Pas de communication à des tiers</b><br />
Vos données ne font l'objet d'aucune communication à des tiers. Vous êtes toutefois informés qu'elles
pourront être divulguées en application d'une loi, d'un règlement ou en vertu d'une décision d'une autorité
réglementaire ou judiciaire compétente.<br />
<br />
<br />
<strong style="font-size: 18px;">Information préalable pour la communication des données personnelles à des tiers en
cas de fusion / absorption</strong><br />
<br />
<b>Information préalable et possibilité d’opt-out avant et après la fusion / acquisition</b><br />
Dans le cas où nous prendrions part à une opération de fusion, d’acquisition ou à toute autre forme de cession
d’actifs, nous nous engageons à garantir la confidentialité de vos données personnelles et à vous informer
avant que celles-ci ne soient transférées ou soumises à de nouvelles règles de confidentialité.<br />
<br />
<br />
<strong style="font-size: 18px;">Finalité de la réutilisation des données personnelles collectées</strong><br />
<br />
<b>L'élaboration de statistiques commerciales</b><br />
<br />
<b>La gestion des demandes de droit d'accès, de rectification et d'opposition</b><br />
<br />
<b style="font-size: 16px;">Agrégation des données</b><br />
<br />
<b>Agrégation avec des données non personnelles</b><br />
Nous pouvons publier, divulguer et utiliser les informations agrégées (informations relatives à tous nos
Utilisateurs ou à des groupes ou catégories spécifiques d'Utilisateurs que nous combinons de manière à ce
qu'un Utilisateur individuel ne puisse plus être identifié ou mentionné) et les informations non personnelles à
des fins d'analyse du secteur et du marché, de profilage démographique, à des fins promotionnelles et
publicitaires et à d'autres fins commerciales.<br />
<br />
<b>Agrégation avec des données personnelles disponibles sur les comptes sociaux de l'Utilisateur</b><br />
Si vous connectez votre compte à un compte d’un autre service afin de faire des envois croisés, ledit service
pourra nous communiquer vos informations de profil, de connexion, ainsi que toute autre information dont
vous avez autorisé la divulgation. Nous pouvons agréger les informations relatives à tous nos autres
Utilisateurs, groupes, comptes, aux données personnelles disponibles sur l’Utilisateur.<br />
<br />
<b style="font-size: 16px;">Collecte des données d'identité</b><br />
<br />
<b>Utilisation d’un pseudonyme</b><br />
L’utilisation du Site nécessite une inscription sans identification préalable. Elle peut s’effectuer sans que vous ne
communiquiez de données nominatives vous concernant (nom, prénom, adresse, etc). Vous pouvez utiliser le
pseudonyme de votre choix.<br />
<br />
<br />
<b style="font-size: 16px;">Collecte des données d'identification</b><br />
<br />
<b>Utilisation de l'identifiant de l'utilisateur pour proposition de mise en relation et offres commerciales</b><br />
Nous utilisons vos identifiants électroniques pour rechercher des relations présentes par connexion, par
adresse mail ou par services. Nous pouvons utiliser vos informations de contact pour permettre à d'autres
personnes de trouver votre compte, notamment via des services tiers et des applications clientes. Vous pouvez
télécharger votre carnet d'adresses afin que nous soyons en mesure de vous aider à trouver des connaissances
sur notre réseau ou pour permettre à d'autres Utilisateurs de notre réseau de vous trouver. Nous pouvons vous
proposer des suggestions, à vous et à d'autres Utilisateurs du réseau, à partir des contacts importés de votre
carnet d’adresses. Nous sommes susceptibles de travailler en partenariat avec des sociétés qui proposent des
offres incitatives. Pour prendre en charge ce type de promotion et d'offre incitative, nous sommes susceptibles
de partager votre identifiant électronique.<br />
<br />
<br />
<b style="font-size: 16px;">Collecte des données du terminal</b><br />
<br />
<b>Aucune collecte des données techniques</b><br />
Nous ne collectons et ne conservons aucune donnée technique de votre appareil (adresse IP, fournisseur
d'accès à Internet...).
<br />
<br />
<b style="font-size: 16px;">Cookies</b><br />
<br />
<b>Durée de conservation des cookies</b><br />
Conformément aux recommandations de la CNIL, la durée maximale de conservation des cookies est de 13
mois au maximum après leur premier dépôt dans le terminal de l'Utilisateur, tout comme la durée de la validité
du consentement de l’Utilisateur à l’utilisation de ces cookies. La durée de vie des cookies n’est pas prolongée
à chaque visite. Le consentement de l’Utilisateur devra donc être renouvelé à l'issue de ce délai.<br />
<br />
<b>Finalité cookies</b><br />
Les cookies peuvent être utilisés pour des fins statistiques notamment pour optimiser les services rendus à
l'Utilisateur, à partir du traitement des informations concernant la fréquence d'accès, la personnalisation des
pages ainsi que les opérations réalisées et les informations consultées.
Vous êtes informé que l'Éditeur est susceptible de déposer des cookies sur votre terminal. Le cookie enregistre
des informations relatives à la navigation sur le service (les pages que vous avez consultées, la date et l'heure
de la consultation...) que nous pourrons lire lors de vos visites ultérieures.<br />
<br />
<b>Droit de l'Utilisateur de refuser les cookies, la désactivation entraînant un fonctionnement dégradé du
service</b><br />
Vous reconnaissez avoir été informé que l'Éditeur peut avoir recours à des cookies, et l'y autorisez. Si vous ne
souhaitez pas que des cookies soient utilisés sur votre terminal, la plupart des navigateurs vous permettent de
désactiver les cookies en passant par les options de réglage. Toutefois, vous êtes informé que certains services
sont susceptibles de ne plus fonctionner correctement.<br />
<br />
<b>Association possible des cookies avec des données personnelles pour permettre le fonctionnement du
service</b><br />
L'Éditeur peut être amenée à recueillir des informations de navigation via l'utilisation de cookies.<br />
<br />
<br />
<b style="font-size: 16px;">Conservation des données techniques</b><br />
<br />
<b>Durée de conservation des données techniques</b><br />
Les données techniques sont conservées pour la durée strictement nécessaire à la réalisation des finalités
visées ci-avant.<br />
<br />
<b style="font-size: 16px;">Délai de conservation des données personnelles et d'anonymisation</b><br />
<br />
<b>Pas de conservation des données</b><br />
Nous ne conservons aucune donnée personnelle au delà de votre durée de connexion au service pour les
finalités décrites dans les présentes CGU.<br />
<br />
<br />
<b>Suppression des données après suppression du compte</b><br />
Des moyens de purge de données sont mis en place afin d'en prévoir la suppression effective dès lors que la
durée de conservation ou d'archivage nécessaire à l'accomplissement des finalités déterminées ou imposées
est atteinte. Conformément à la loi n°78-17 du 6 janvier 1978 relative à l'informatique, aux fichiers et aux
libertés, vous disposez par ailleurs d'un droit de suppression sur vos données que vous pouvez exercer à tout
moment en prenant contact avec l'Éditeur.<br />
<br />
<b>Suppression des données après 3 ans d'inactivité</b><br />
Pour des raisons de sécurité, si vous ne vous êtes pas authentifié sur le Site pendant une période de trois ans,
vous recevrez un e-mail vous invitant à vous connecter dans les plus brefs délais, sans quoi vos données seront
supprimées de nos bases de données.<br />
<br />
<b style="font-size: 16px;">Suppression du compte</b><br />
<br />
<b>Suppression du compte à la demande</b><br />
L'Utilisateur a la possibilité de supprimer son Compte à tout moment, par simple demande à l'Éditeur OU par
le menu de suppression de Compte présent dans les paramètres du Compte le cas échéant.<br />
<br />
<b>Suppression du compte en cas de violation des CGU</b><br />
En cas de violation d'une ou de plusieurs dispositions des CGU ou de tout autre document incorporé aux
présentes par référence, l'Éditeur se réserve le droit de mettre fin ou restreindre sans aucun avertissement
préalable et à sa seule discrétion, votre usage et accès aux services, à votre compte et à tous les Sites.<br />
<br />
<b style="font-size: 16px;">Indications en cas de faille de sécurité décelée par l'Éditeur</b><br />
<br />
<b>Information de l'Utilisateur en cas de faille de sécurité</b><br />
Nous nous engageons à mettre en oeuvre toutes les mesures techniques et organisationnelles appropriées afin
de garantir un niveau de sécurité adapté au regard des risques d'accès accidentels, non autorisés ou illégaux,
de divulgation, d'altération, de perte ou encore de destruction des données personnelles vous concernant.
Dans l'éventualité où nous prendrions connaissance d'un accès illégal aux données personnelles vous
concernant stockées sur nos serveurs ou ceux de nos prestataires, ou d'un accès non autorisé ayant pour
conséquence la réalisation des risques identifiés ci-dessus, nous nous engageons à :<br />
<br />
• Vous notifier l'incident dans les plus brefs délais ;<br />
• Examiner les causes de l'incident et vous en informer ;<br />
• Prendre les mesures nécessaires dans la limite du raisonnable afin d'amoindrir les effets négatifs et
préjudices pouvant résulter dudit incident<br />
<br />
<br />
<b>Limitation de la responsabilité</b><br />
En aucun cas les engagements définis au point ci-dessus relatifs à la notification en cas de faille de sécurité ne
peuvent être assimilés à une quelconque reconnaissance de faute ou de responsabilité quant à la survenance
de l'incident en question.<br />
<br />
<b style="font-size: 16px;">Transfert des données personnelles à l'étranger</b><br />
<br />
<b>Pas de transfert en dehors de l'Union européenne</b><br />
L'Éditeur s'engage à ne pas transférer les données personnelles de ses Utilisateurs en dehors de l'Union
européenne.<br />
<br />
<br />
<b style="font-size: 16px;">Modification des CGU et de la politique de confidentialité</b><br />
<br />
<b>En cas de modification des présentes CGU, engagement de ne pas baisser le niveau de confidentialité de
manière substantielle sans l'information préalable des personnes concernées</b><br />
Nous nous engageons à vous informer en cas de modification substantielle des présentes CGU, et à ne pas
baisser le niveau de confidentialité de vos données de manière substantielle sans vous en informer et obtenir
votre consentement.<br />
<br />
<b style="font-size: 16px;">Droit applicable et modalités de recours</b><br />
<br />
<b>Clause d'arbitrage</b><br />
Vous acceptez expressément que tout litige susceptible de naître du fait des présentes CGU, notamment de
son interprétation ou de son exécution, relèvera d'une procédure d'arbitrage soumise au règlement de la
plateforme d'arbitrage choisie d'un commun accord, auquel vous adhérerez sans réserve.<br />
<br />
<br />
<b style="font-size: 16px;">Portabilité des données</b><br />
<br />
<b>Portabilité des données</b><br />
L'Éditeur s'engage à vous offrir la possibilité de vous faire restituer l'ensemble des données vous concernant
sur simple demande. L'Utilisateur se voit ainsi garantir une meilleure maîtrise de ses données, et garde la
possibilité de les réutiliser. Ces données devront être fournies dans un format ouvert et aisément réutilisable.
