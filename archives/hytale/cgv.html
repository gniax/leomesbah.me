<label style="text-align:center;font-size:30px;">Conditions Générales de Vente (CGV)</label>
<br />
<br />
<p><strong style="font-size: 20px;">PREAMBULE</strong></p>
<br />
Les présentes conditions générales de vente sont conclues entre Hytale-Serveur et toute personne physique non commerçante souhaitant effectuer une mise en avant temporaire "Premium" sur le site www.hytale-serveur.com<br />
<br />
Les Parties conviennent que les présentes Conditions Générales de Vente régissent exclusivement leur relation. Hytale-Serveur se réserve le droit de modifier ponctuellement les Conditions Générales de vente. Elles seront applicables dès leur mise en ligne.<br />
<br />
Conditions générales de vente des produits vendus sur le site www.hytale-serveur.com<br />
<br />
<strong style="font-size: 18px;">OBJET</strong><br />
<br />
Les Conditions Générales de Vente visent à définir les modalités de vente entre Hytale-Serveur et l'Utilisateur, à partir de l'acte d'achat d'un emplacement publicitaire temporaire pour une durée déterminée par l'utilisateur sur www.hytale-serveur.com<br />
<br />
<strong style="font-size: 18px;">PRODUITS</strong><br />
<br />
Les produits régis par les présentes Conditions Générales de Vente sont des emplacements publicitaires temporaires fourni aux utilisateurs de www.hytale-serveur.com en affichant en page d'accueil de leur publicité pour leur site/serveur Hytale pendant une durée limité choisie au moment de l'achat.<br />
<br />
<strong style="font-size: 18px;">TARIFS</strong><br />
<br />
Les tarifs de nos articles sont affichés sur la boutique au moment du paiement. Ils sont indiqués toutes taxes comprises. Hytale-Serveur.com se réserve le droit de modifier ses prix à tout moment.<br />
<br />
<strong style="font-size: 18px;">LA COMMANDE</strong><br />
<br />
Pour passer une commande, l'Utilisateur a pas besoin de s'identifier sur le site et donc d'avoir créer un compte, il doit passer par la page Inscription, puis Connexion, où il pourra consulter la page Premium indiquant la liste d'attente (potentielle) des serveurs ayant acheté un affichage en tête de liste sur www.hytale-serveur.com<br />
<br />
La commande se fait par ID fourni le jour de l'inscription du serveur, individuellement, pour chaque serveur enregistré sur le site.<br />
<br />
Toute commande vaut acceptation des prix et du règlement.<br />
<br />
<strong style="font-size: 18px;">LES MODALITES DE PAIEMENT</strong><br />
<br />
L'Utilisateur a le choix de régler son achat :<br /> 
- par Paypal <br />
- Par carte bancaire (Carte Bleue, e-carte bleue, Visa, Mastercard, carte American Express.) en passant par le site de Paypal<br />
<br />
<strong style="font-size: 18px;">LA LIVRAISON</strong><br />
<br />
Après validation de votre commande, l'affichage de votre site mit en avant va dépendre des dates indiquées au moment du paiement et sa durée choisie par l'acheteur sur la page Premium.<br />
<br />
La mise en avant est possible uniquement pour le serveur ayant réalisé l'acte d'achat au préalable, il n'est pas possible de changer de serveur avant ou pendant une mise en avant.<br />
<br />
<strong style="font-size: 18px;">DELAI DE RETRACTATION</strong><br />
<br />
Conformément aux dispositions de l'article L.121-21 du Code de la Consommation, vous disposez d'un délai de rétractation de 14 jours à compter de la réception de vos produits pour exercer votre droit de rétraction sans avoir à justifier de motifs ni à payer de pénalité.<br />
<br />
Ce droit ne peut s'appliquer ici dans le cas de l'entreprise HYTALE SERVEUR qui fournit un service immédiat lors de l'achat.<br />
<br />
<strong style="font-size: 18px;">EXCEPTIONS AU DROIT DE RETRACTATION</strong><br />
<br />
Conformément aux dispositions de l'article L.121-21-8 du Code de la Consommation, le droit de rétractation ne s'applique pas à :<br /> 
La fourniture de services pleinement exécutés avant la fin du délai de rétractation et dont l'exécution a commencé après accord préalable exprès du consommateur et renoncement exprès à son droit de rétractation.<br />
La fourniture de biens ou de services dont le prix dépend de fluctuations sur le marché financier échappant au contrôle du professionnel et susceptibles de se produire pendant le délai de rétractation. <br />
La fourniture de biens confectionnés selon les spécifications du consommateur ou nettement personnalisés. <br />
La fourniture de biens susceptibles de se détériorer ou de se périmer rapidement. <br />
La fourniture de biens qui, après avoir été livrés et de par leur nature, sont mélangés de manière indissociable avec d'autres articles. <br />
La fourniture d'un contenu numérique non fourni sur un support matériel dont l'exécution a commencé après accord préalable exprès du consommateur et renoncement exprès à son droit de rétractation.<br />
<br />
<strong style="font-size: 18px;">RESPONSABILITE</strong><br />
<br />
Hytale-Serveur.com ne pourra être tenu comme responsable si un serveur mis en avant rencontre un problème pendant la durée de sa publicité.<br />
<br />
Une mise en avant sur notre site est génératrice d'un trafic important, vous devez veillez à ce que votre serveur soit capable de supporter la charge de trafic avant d'opter pour une mise en avant prolongée.<br />
<br />
<strong style="font-size: 18px;">INDISPONIBILITE</strong><br />
<br />
Hytale-Serveur.com vous garantit une disponibilité de votre publicité à 90%. Si Hytale-Serveur.com rencontre des problèmes techniques indépendamment de sa volonté rendant impossible la diffusion de la publicité sur l'emplacement en tête de liste d'un serveur, vous pourrez consentir à un dédommagement en fonction de la durée de l'interruption:<br />
<br />
Interruption inférieure à 10% de la durée achetée : Aucune compensation ne pourra être consentie <br />
Interruption inférieure à 10% de la durée achetée : Aucune compensation ne pourra être consentie <br />
Interruption inférieure à 70% : Un remboursement partiel ou un nouvelle mise en avant d'une durée équivalente à la durée d'interruption vous sera proposée. <br />
Plus de 70% de coupure : Un remboursement intégral ou une nouvelle mise en avant identique vous sera offerte.<br />
